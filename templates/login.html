<!DOCTYPE html>
<html>

<head>
    <title>Login - Secure Vault</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f4f9;
            padding: 40px;
        }

        .container {
            max-width: 400px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0 20px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .primary-btn {
            width: 100%;
            padding: 12px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        .primary-btn:hover {
            background-color: #004494;
        }

        .danger {
            background-color: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .success {
            background-color: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Login to Vault</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="{{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="username" placeholder="Email or Username" required style="margin-bottom: 10px;">
            <input type="password" name="password" placeholder="Password" required style="margin-bottom: 15px;">

            <div
                style="display: flex; align-items: center; justify-content: flex-start; margin-bottom: 20px; font-size: 14px; width: 100%;">
                <input type="checkbox" name="remember" id="remember"
                    style="width: auto; margin: 0 8px 0 3px; cursor: pointer;">
                <label for="remember" style="color: #555; cursor: pointer; margin: 0;">Remember my account</label>
            </div>

            <button type="submit" class="primary-btn">Unlock Vault</button>
        </form>
        <p style="margin-top: 20px; font-size: 14px;">Don't have an account? <a
                href="{{ url_for('register') }}">Register here</a></p>
    </div>
</body>

</html>
