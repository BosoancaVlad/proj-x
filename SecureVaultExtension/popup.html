<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 250px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 15px;
            text-align: center;
            margin: 0;
            background-color: #ffffff;
        }

        h2 {
            margin: 0 0 15px 0;
            color: #333;
            font-size: 18px;
        }

        /* The Login Form Formats */
        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 8px;
            background-color: #0e0a0a;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            opacity: 0.8;
        }

        #error-msg {
            color: #dc3545;
            font-size: 12px;
            margin-top: 10px;
            display: none;
        }

        /* The Status Formats */
        .status-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            border-radius: 8px;
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
        }

        .dot {
            height: 12px;
            width: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .online {
            background-color: #28a745;
            box-shadow: 0 0 8px #28a745;
        }

        .offline {
            background-color: #dc3545;
            box-shadow: 0 0 8px #dc3545;
        }

        #status-text {
            font-weight: bold;
            font-size: 14px;
            color: #6c757d;
        }
    </style>
</head>

<body>

    <h2>Secure Vault</h2>

    <div id="login-section" style="display: none;">
        <input type="text" id="ext-username" placeholder="Email or Username">
        <input type="password" id="ext-password" placeholder="Password">
        <button id="login-btn">Log In</button>
        <div id="error-msg">Invalid credentials.</div>
    </div>

    <div id="status-section" class="status-container" style="display: none;">
        <span id="status-dot" class="dot"></span>
        <span id="status-text">Checking server...</span>
    </div>

    <script src="popup.js"></script>
</body>

</html>
